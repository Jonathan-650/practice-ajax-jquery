<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
    Add post
    </button>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLabel">Create Data</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
            </button>
        </div>
        <div class="modal-body">
            <label for="title-input">title</label>
            <input type="text" id="title-input" class="form-control"/>
            <label for="body-input">body</label>
            <textarea id="body-input" class="form-control" style="min-height: 100px"></textarea>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-primary" id="submit-button">Save changes</button>
        </div>
        </div>
    </div>
    </div>

    <div class="modal fade" id="edit-modal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLabel">Edit data</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
            </button>
        </div>
        <div class="modal-body">
            <label for="title-input">title</label>
            <input type="text" id="title-input-edit" class="form-control"/>
            <label for="body-input">body</label>
            <textarea id="body-input-edit" class="form-control" style="min-height: 100px"></textarea>
            <input hidden type="text" id="id-input-edit" class="form-control"/>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-primary" id="edit-button">Save changes</button>
        </div>
        </div>
    </div>
    </div>

    <table class="table">
    <thead>
        <tr>
            <th scope="col">#</th>
            <th scope="col">First</th>
            <th scope="col">Last</th>
            <th scope="col">Handle</th>
        </tr>
    </thead>
    <tbody id="item-holder">
        <tr>
            <th scope="row">1</th>
            <td>Mark</td>
            <td>Otto</td>
            <td>@mdo</td>
        </tr>
    </tbody>
</table>
<script>
    const fetchData = () => {
        $.ajax({
            url:"https://jsonplaceholder.typicode.com/posts",
            beforeSend: function(xhr) {
                Swal.showLoading()
            }
        })
        .done(function(data) {
            Swal.close()
            data.forEach(dt => {
                $("#item-holder").append(`
                    <tr>
                        <th scope="row">${dt.id}</th>
                        <td>${dt.title}</td>
                        <td>${dt.body}</td>
                        <td>
                            <button type="button" class="btn btn-primary btn-update" data-bs-toggle="modal" data-bs-target="#edit-modal" 
                                data-id="${dt.id}"
                                data-title="${dt.title}"
                                data-body="${dt.body}"
                                >             
                            EDIT
                            </button>
                        </td>
                    </tr>
                `)
            });
        })
    }

    const createData = () => {
        $.ajax({
            url:"https://jsonplaceholder.typicode.com/posts",
            method: "post",
            contentType: "application/json",
            data: JSON.stringify({
                title: $('#title-input').val().trim(),
                body: $('#body-input').val().trim(),
                userId: 1,
            }),
            beforeSend: function(xhr) {
                Swal.showLoading()
            }
        })
        .done(function(data) {
            Swal.close()
            Swal.fire({
                title: "Good job!",
                text: "You clicked the button!",
                icon: "success"
            });
        })
    }
    $(document).on("click", "#submit-button", function(){
        createData()
    })

    const updateDataById = (id, title, body) => {
        $.ajax({
            url:`https://jsonplaceholder.typicode.com/posts/${id}`,
            method: "PUT",
            contentType: "application/json",
            data: JSON.stringify({
                title: title.trim(),
                body: body.trim(),            
            }),
            beforeSend: function(xhr) {
                Swal.showLoading()
            }
        })
        .done(function(data) {
            Swal.close()
            Swal.fire({
                title: "Good job!",
                text: "You clicked the button!",
                icon: "success"
            });
        })
    }

    $(document).on("click", ".btn-update", function(){
        const id = $(this).data("id")
        const title = $(this).data("title")
        const body= $(this).data("body")
        $('#title-input-edit').val(title)
        $('#body-input-edit').val(body)
        $('#id-input-edit').val(id)
    })
    
    $(document).on("click", "#edit-button", function(){
        const title = $('#title-input-edit').val()
        const body = $('#body-input-edit').val()
        const id =$('#id-input-edit').val()
        updateDataById(id, title, body)
    })

    


    fetchData()
</script>
</body>
</html>
